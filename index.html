<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Chicago — Events Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="header__logo">
      <span class="header__title">Explore Chicago</span>
      <span class="header__stars">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
      </span>
    </a>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero__content">
      <h1 class="hero__headline">Chicago Events Calendar</h1>
      <p class="hero__subline">Discover festivals, concerts, and activities across the city</p>
    </div>
  </section>

  <!-- Filter Tags -->
  <div class="filters">
    <button class="filter-tag active" data-filter="all">All</button>
    <button class="filter-tag" data-filter="free">Free</button>
    <button class="filter-tag" data-filter="Music">Music</button>
    <button class="filter-tag" data-filter="Food & Drink">Food & Drink</button>
    <button class="filter-tag" data-filter="Outdoor">Outdoor</button>
    <button class="filter-tag" data-filter="Arts & Culture">Arts & Culture</button>
    <button class="filter-tag" data-filter="Festival">Festival</button>
  </div>

  <!-- Main Content -->
  <main class="main" id="events-container">
    <!-- Events will be dynamically rendered here -->
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__content">
      <div class="footer__logo">
        <span class="footer__title">Explore Chicago</span>
        <span class="footer__stars">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        </span>
      </div>
      <p class="footer__sources">Data sourced from Choose Chicago, Chicago Park District, and local event organizers</p>
    </div>
  </footer>

  <script>
    const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const FULL_MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    const CATEGORY_CLASS_MAP = {
      'Music': 'music',
      'Food & Drink': 'food',
      'Outdoor': 'outdoor',
      'Arts & Culture': 'arts',
      'Festival': 'festival'
    };

    const PIN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

    let allEvents = [];
    let currentFilter = 'all';

    async function loadEvents() {
      try {
        const response = await fetch('data/events.json');
        const data = await response.json();
        allEvents = data.events;
        renderEvents(allEvents);
      } catch (error) {
        console.error('Error loading events:', error);
        document.getElementById('events-container').innerHTML =
          '<p class="error">Unable to load events. Please try again later.</p>';
      }
    }

    function formatDateRange(event) {
      const start = new Date(event.startDate);
      const startDay = start.getDate();
      const startMonth = MONTH_NAMES[start.getMonth()];

      if (event.dateTBA) {
        return { dateText: `${startMonth} TBA`, year: start.getFullYear() };
      }

      if (event.endDate) {
        const end = new Date(event.endDate);
        const endDay = end.getDate();
        const endMonth = MONTH_NAMES[end.getMonth()];

        if (start.getMonth() === end.getMonth()) {
          return { dateText: `${startMonth} ${startDay}–${endDay}`, year: start.getFullYear() };
        } else {
          return { dateText: `${startMonth} ${startDay}–${endMonth} ${endDay}`, year: start.getFullYear() };
        }
      }

      return { dateText: `${startMonth} ${startDay}`, year: start.getFullYear() };
    }

    function renderEvents(events) {
      const container = document.getElementById('events-container');

      // Group events by month
      const eventsByMonth = {};

      events.forEach(event => {
        const date = new Date(event.startDate);
        const key = `${date.getFullYear()}-${String(date.getMonth()).padStart(2, '0')}`;
        if (!eventsByMonth[key]) {
          eventsByMonth[key] = [];
        }
        eventsByMonth[key].push(event);
      });

      // Sort months chronologically
      const sortedMonths = Object.keys(eventsByMonth).sort();

      let html = '';

      sortedMonths.forEach(monthKey => {
        const [year, month] = monthKey.split('-').map(Number);
        const monthEvents = eventsByMonth[monthKey].sort((a, b) =>
          new Date(a.startDate) - new Date(b.startDate)
        );

        html += `
          <section class="month-section">
            <h2 class="month-header">${FULL_MONTH_NAMES[month]} ${year}</h2>
            <div class="event-cards">
        `;

        monthEvents.forEach(event => {
          const { dateText, year } = formatDateRange(event);
          const categoryClass = CATEGORY_CLASS_MAP[event.category] || '';
          const priceTag = event.price === 'free'
            ? '<span class="tag tag--free">Free</span>'
            : '<span class="tag tag--ticketed">Ticketed</span>';

          html += `
            <article class="event-card">
              <div class="event-card__banner event-card__banner--${categoryClass}">
                <span class="event-card__date-main">${dateText}</span>
                <span class="event-card__date-year">${year}</span>
              </div>
              <div class="event-card__body">
                <h3 class="event-card__name">${event.name}</h3>
                <div class="event-card__location">
                  ${PIN_ICON}
                  <span>${event.location}</span>
                </div>
                <div class="event-card__tags">
                  ${priceTag}
                  <span class="tag tag--category">${event.category}</span>
                </div>
              </div>
            </article>
          `;
        });

        html += '</div>';
        html += '</section>';
      });

      container.innerHTML = html;
    }

    function filterEvents(filter) {
      currentFilter = filter;

      if (filter === 'all') {
        renderEvents(allEvents);
      } else if (filter === 'free') {
        renderEvents(allEvents.filter(e => e.price === 'free'));
      } else {
        renderEvents(allEvents.filter(e => e.category === filter));
      }
    }

    // Initialize filters
    document.querySelectorAll('.filter-tag').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
        button.classList.add('active');
        filterEvents(button.dataset.filter);
      });
    });

    // Load events on page load
    loadEvents();
  </script>

</body>
</html>
