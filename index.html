<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Chicago — Events Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="header__logo">
      <span class="header__title">Explore Chicago</span>
      <span class="header__stars">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
      </span>
    </a>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero__content">
      <h1 class="hero__headline">Chicago Events Calendar</h1>
      <p class="hero__subline">Discover festivals, concerts, and activities across the city</p>
    </div>
  </section>

  <!-- Dropdown Filters -->
  <div class="dropdowns">
    <div class="dropdown-group">
      <label class="dropdown-label" for="filter-month">Month</label>
      <select class="dropdown" id="filter-month">
        <option value="all">All Months</option>
        <option value="recurring">Recurring</option>
        <option value="may">May</option>
        <option value="jun">June</option>
        <option value="jul">July</option>
        <option value="aug">August</option>
        <option value="sep">September</option>
        <option value="oct">October</option>
      </select>
    </div>
    <div class="dropdown-group">
      <label class="dropdown-label" for="filter-category">Category</label>
      <select class="dropdown" id="filter-category">
        <option value="all">All Categories</option>
        <option value="free">Free</option>
        <option value="Music">Music</option>
        <option value="Food &amp; Drink">Food &amp; Drink</option>
        <option value="Outdoor">Outdoor</option>
        <option value="Arts &amp; Culture">Arts &amp; Culture</option>
        <option value="Festival">Festival</option>
      </select>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main" id="events-container">
    <!-- Events will be dynamically rendered here -->
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__content">
      <div class="footer__logo">
        <span class="footer__title">Explore Chicago</span>
        <span class="footer__stars">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,6 93,75 7,75"/><polygon points="50,94 7,25 93,25"/></svg>
        </span>
      </div>
      <p class="footer__sources">Data sourced from Choose Chicago, Chicago Park District, and local event organizers</p>
    </div>
  </footer>

  <script>
    const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const FULL_MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    const MONTH_IDS  = { 4: 'month-may', 5: 'month-jun', 6: 'month-jul', 7: 'month-aug', 8: 'month-sep', 9: 'month-oct' };
    const MONTH_NUMS = { may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9 };

    const MONTH_COLORS = {
      4: '#2D7A3A',
      5: '#6B3FA0',
      6: '#CC1F20',
      7: '#C4650A',
      8: '#0F6E56',
      9: '#8B3A0F',
    };

    const PIN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
    const EXTERNAL_LINK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

    const CATEGORY_ICONS = {
      'Music':         '🎵',
      'Festival':      '🎉',
      'Food & Drink':  '🍽️',
      'Outdoor':       '🌿',
      'Arts & Culture':'🎭',
    };

    const NAME_ICONS = [
      { match: /bird sanctuary/i,  icon: '🐦' },
      { match: /zoo/i,             icon: '🦁' },
      { match: /conservatory/i,    icon: '🌸' },
      { match: /lollapalooza/i,    icon: '🎸' },
      { match: /air.*water|water.*air/i, icon: '✈️' },
      { match: /pride/i,           icon: '🌈' },
      { match: /bike.*drive/i,     icon: '🚴' },
      { match: /jazz/i,            icon: '🎷' },
      { match: /film festival/i,   icon: '🎬' },
      { match: /farmers market/i,  icon: '🥕' },
      { match: /kayak/i,           icon: '🚣' },
      { match: /taco/i,            icon: '🌮' },
      { match: /wine/i,            icon: '🍷' },
    ];

    function getIcon(event) {
      for (const { match, icon } of NAME_ICONS) {
        if (match.test(event.name)) return icon;
      }
      return CATEGORY_ICONS[event.category] || '📍';
    }

    let allEvents = [];
    let allRecurring = [];

    async function loadEvents() {
      try {
        const response = await fetch('data/events.json');
        const data = await response.json();
        allEvents = data.events;
        allRecurring = data.recurring || [];
        renderEvents(allEvents, allRecurring);
      } catch (error) {
        console.error('Error loading events:', error);
        document.getElementById('events-container').innerHTML =
          '<p class="error">Unable to load events. Please try again later.</p>';
      }
    }

    function formatDateRange(event) {
      const start = new Date(event.startDate);
      const startDay = start.getDate();
      const startMonth = MONTH_NAMES[start.getMonth()];

      if (event.dateTBA) {
        return { dateText: `${startMonth} TBA`, year: start.getFullYear() };
      }

      if (event.endDate) {
        const end = new Date(event.endDate);
        const endDay = end.getDate();
        const endMonth = MONTH_NAMES[end.getMonth()];

        if (start.getMonth() === end.getMonth()) {
          return { dateText: `${startMonth} ${startDay}–${endDay}`, year: start.getFullYear() };
        } else {
          return { dateText: `${startMonth} ${startDay}–${endMonth} ${endDay}`, year: start.getFullYear() };
        }
      }

      return { dateText: `${startMonth} ${startDay}`, year: start.getFullYear() };
    }

    function makeCard(event, bannerColor, dateText, yearText) {
      const priceTag = event.price === 'free'
        ? '<span class="tag tag--free">Free</span>'
        : '<span class="tag tag--ticketed">Ticketed</span>';
      const linkIcon = event.link
        ? `<span class="event-card__link-icon">${EXTERNAL_LINK_ICON}</span>`
        : '';
      const cardOpen = event.link
        ? `<a href="${event.link}" target="_blank" rel="noopener noreferrer" class="event-card">`
        : `<article class="event-card">`;
      const cardClose = event.link ? `</a>` : `</article>`;
      return `
        ${cardOpen}
          <div class="event-card__banner" style="background-color:${bannerColor}">
            <span class="event-card__date-main">${dateText}</span>
            ${yearText ? `<span class="event-card__date-year">${yearText}</span>` : ''}
            ${linkIcon}
          </div>
          <div class="event-card__body">
            <h3 class="event-card__name"><span class="event-card__icon">${getIcon(event)}</span>${event.name}</h3>
            <div class="event-card__footer">
              <div class="event-card__location">
                ${PIN_ICON}
                <span>${event.location}</span>
              </div>
              <div class="event-card__tags">
                ${priceTag}
                <span class="tag tag--category">${event.category}</span>
              </div>
            </div>
          </div>
        ${cardClose}
      `;
    }

    function renderEvents(events, recurringEvents) {
      const container = document.getElementById('events-container');
      const eventsByMonth = {};

      events.forEach(event => {
        const date = new Date(event.startDate);
        const key = `${date.getFullYear()}-${String(date.getMonth()).padStart(2, '0')}`;
        if (!eventsByMonth[key]) eventsByMonth[key] = [];
        eventsByMonth[key].push(event);
      });

      let html = '';

      if (recurringEvents.length > 0) {
        html += `<section class="month-section" id="month-recurring"><h2 class="month-header">Recurring Events</h2><div class="event-cards">`;
        recurringEvents.forEach(event => {
          html += makeCard(event, '#003F6B', event.schedule, '');
        });
        html += '</div></section>';
      }

      Object.keys(eventsByMonth).sort().forEach(monthKey => {
        const [year, month] = monthKey.split('-').map(Number);
        const monthEvents = eventsByMonth[monthKey].sort((a, b) =>
          new Date(a.startDate) - new Date(b.startDate)
        );
        const sectionId = MONTH_IDS[month] ? ` id="${MONTH_IDS[month]}"` : '';
        html += `<section class="month-section"${sectionId}><h2 class="month-header">${FULL_MONTH_NAMES[month]} ${year}</h2><div class="event-cards">`;
        monthEvents.forEach(event => {
          const { dateText, year } = formatDateRange(event);
          const bannerColor = MONTH_COLORS[new Date(event.startDate).getMonth()] || '#003F6B';
          html += makeCard(event, bannerColor, dateText, year);
        });
        html += '</div></section>';
      });

      container.innerHTML = html;
    }

    function applyFilters() {
      const month    = document.getElementById('filter-month').value;
      const category = document.getElementById('filter-category').value;

      let filteredEvents = month === 'recurring' ? [] : allEvents;

      if (month !== 'all' && month !== 'recurring') {
        filteredEvents = filteredEvents.filter(e =>
          new Date(e.startDate).getMonth() === MONTH_NUMS[month]
        );
      }

      if (category === 'free') {
        filteredEvents = filteredEvents.filter(e => e.price === 'free');
      } else if (category !== 'all') {
        filteredEvents = filteredEvents.filter(e => e.category === category);
      }

      let filteredRecurring = (month === 'all' || month === 'recurring') ? [...allRecurring] : [];

      if (filteredRecurring.length > 0 && category !== 'all') {
        filteredRecurring = category === 'free'
          ? filteredRecurring.filter(e => e.price === 'free')
          : filteredRecurring.filter(e => e.category === category);
      }

      renderEvents(filteredEvents, filteredRecurring);
    }

    document.getElementById('filter-month').addEventListener('change', applyFilters);
    document.getElementById('filter-category').addEventListener('change', applyFilters);

    loadEvents();
  </script>

</body>
</html>
